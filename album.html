<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>Album ảnh | Lạc Ngọc Như ✨</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700&family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <canvas id="heartRainCanvas"></canvas>

    <div class="container">
      <div class="header-bar">
        <nav class="main-nav">
          <a href="index.html" class="nav-link"
            ><i class="fas fa-home"></i> Trang chủ</a
          >
          <a href="album.html" class="nav-link active"
            ><i class="fas fa-images"></i> Album ảnh</a
          >
        </nav>
        <div class="theme-toggle" id="darkModeToggle">
          <i class="fas fa-moon" id="themeIcon"></i>
          <span id="themeText">Chế độ tối</span>
        </div>
      </div>

      <div class="card full-width">
        <h2><i class="fas fa-images"></i> 📸 Khoảnh khắc đáng nhớ</h2>
        <p style="margin-bottom: 1rem; color: var(--text-secondary)">
          Những bức ảnh lưu giữ kỷ niệm đẹp 🌸
        </p>
        <div class="album-grid" id="albumGrid"></div>

        <!-- Modal xem ảnh lớn -->
        <div id="imageModal" class="modal">
          <span class="modal-close">&times;</span>
          <img class="modal-content" id="modalImage" />
          <div id="modalCaption"></div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
